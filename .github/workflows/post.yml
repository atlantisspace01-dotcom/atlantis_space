name: Atlantis Space — Daily 10 Posts

on:
  schedule:
    - cron: '0 3 * * *'    # IST 08:30
    - cron: '0 6 * * *'    # IST 11:30
    - cron: '30 9 * * *'   # IST 15:00
    - cron: '0 13 * * *'   # IST 18:30
    - cron: '0 16 * * *'   # IST 21:30
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System packages
        run: sudo apt-get install -y fonts-noto fonts-noto-extra ffmpeg

      - name: Dependencies install
        run: pip install ddgs groq requests Pillow python-dotenv PyNaCl gtts edge-tts

      - name: Configure git auth
        run: |
          git config --global user.email "bot@atlantisspace.ai"
          git config --global user.name "Atlantis Space Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Post space news
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SPACE_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.SPACE_INSTAGRAM_ACCESS_TOKEN }}
          SPACE_INSTAGRAM_ACCOUNT_ID: ${{ secrets.SPACE_INSTAGRAM_ACCOUNT_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          SPACE_APP_ID: ${{ secrets.SPACE_APP_ID }}
          SPACE_APP_SECRET: ${{ secrets.SPACE_APP_SECRET }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python agent.py
