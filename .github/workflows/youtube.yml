name: Atlantis Space — YouTube Shorts (6×/day)

on:
  schedule:
    - cron: '30 1 * * *'   # IST 07:00
    - cron: '30 4 * * *'   # IST 10:00
    - cron: '30 7 * * *'   # IST 13:00
    - cron: '30 10 * * *'  # IST 16:00
    - cron: '30 13 * * *'  # IST 19:00
    - cron: '30 16 * * *'  # IST 22:00
  workflow_dispatch:

jobs:
  youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System packages
        run: sudo apt-get install -y fonts-noto fonts-noto-extra ffmpeg

      - name: Install dependencies
        run: pip install groq requests Pillow python-dotenv gtts edge-tts

      - name: Configure git
        run: |
          git config --global user.email "bot@atlantisspace.ai"
          git config --global user.name "Atlantis Space Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Post YouTube Shorts
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          NASA_API_KEY:           ${{ secrets.NASA_API_KEY }}
          GH_PAT:                 ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:      ${{ github.repository }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_ONLY:           "true"
        run: python agent.py
