name: Atlantis Space — YouTube Shorts (5×/day)

# Budget: 5 uploads × 1600 units = 8,000/day (hard limit: 10,000)
# Schedule offset from Instagram (post.yml) so they don't run simultaneously

on:
  schedule:
    - cron: '15 2 * * *'    # IST 07:45
    - cron: '15 5 * * *'    # IST 10:45
    - cron: '45 8 * * *'    # IST 14:15
    - cron: '15 12 * * *'   # IST 17:45
    - cron: '15 15 * * *'   # IST 20:45
  workflow_dispatch:

jobs:
  youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System packages
        run: sudo apt-get install -y fonts-noto fonts-noto-extra ffmpeg

      - name: Install dependencies
        run: pip install ddgs groq requests Pillow python-dotenv PyNaCl gtts edge-tts

      - name: Configure git
        run: |
          git config --global user.email "bot@atlantisspace.ai"
          git config --global user.name "Atlantis Space Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Post YouTube Shorts
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          NASA_API_KEY:           ${{ secrets.NASA_API_KEY }}
          GH_PAT:                 ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:      ${{ github.repository }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_ONLY:           "true"
        run: python agent.py
